# Model routing configuration for ADK agents
# Four-provider balance: Google (native SDK), DeepSeek + OpenAI + Anthropic (LiteLLM)
# Cheap non-frontier models for prototype validation

models:
  specification:
    provider: google
    model: gemini-2.5-flash
    sdk: native
    temperature: 0.2
    max_tokens: 2048

  planner:
    provider: anthropic
    model: claude-fable-5
    sdk: litellm
    temperature: 0.3
    max_tokens: 4096

  implementation:
    provider: deepseek
    model: deepseek-chat
    sdk: litellm
    temperature: 0.0
    max_tokens: 8192

  independent_test:
    provider: openai
    model: gpt-4o-mini
    sdk: litellm
    temperature: 0.5
    max_tokens: 4096

  adversarial_review:
    provider: google
    model: gemini-2.5-flash
    sdk: native
    temperature: 0.4
    max_tokens: 4096

  explanation:
    provider: google
    model: gemini-2.5-flash
    sdk: native
    temperature: 0.1
    max_tokens: 2048

default_provider: google

context_budgets:
  specification: 16000
  planner: 16000
  implementation: 32000
  independent_test: 8000
  adversarial_review: 16000
  explanation: 16000
